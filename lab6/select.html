<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 1 - Select</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        select {
            padding: 8px;
            font-size: 16px;
            margin: 10px 0;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Работа с select</h1>
        <select id="musicSelect">
            <option value="Rock">Рок</option>
            <option value="Blues" selected>Блюз</option>
        </select>
    </div>

    <script>
        'use strict';

        const select = document.getElementById('musicSelect');

        const newOption = document.createElement('option');
        newOption.value = "Classic";
        newOption.text = "Классика";
        select.add(newOption);
        select.value = "Classic";
    </script>
</body>
</html>
