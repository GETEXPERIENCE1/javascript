<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3 - Редактируемый div</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        .editable-div {
            width: 100%;
            min-height: 120px;
            border: 2px dashed #4CAF50;
            padding: 15px;
            margin: 10px 0;
            background: #f9f9f9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .editable-div:hover {
            background: #e8f4f8;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #4CAF50;
            border-radius: 8px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }
        .info {
            margin-top: 15px;
            padding: 10px;
            background: #e8f4f8;
            border-radius: 5px;
            font-size: 14px;
        }
        kbd {
            background: #333;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Редактируемый div</h1>
        <div id="myDiv" class="editable-div" tabindex="0">
            <!-- содержимое будет загружено из localStorage или установлено по умолчанию -->
        </div>
        <div class="info">
            💡 Кликни на область выше → нажми <kbd>Ctrl+E</kbd> → измени текст → <kbd>Ctrl+S</kbd> или <kbd>Esc</kbd>
        </div>
    </div>

    <script>
        'use strict';

        const div = document.getElementById('myDiv');
        let isEditing = false;
        let originalContent = '';
        const STORAGE_KEY = 'editable_div_content';

        function loadFromStorage() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved && saved.trim() !== '') {
                div.innerHTML = saved;
            } else {
                div.innerHTML = 'Нажми <kbd>Ctrl+E</kbd> для редактирования. <kbd>Ctrl+S</kbd> сохранить, <kbd>Esc</kbd> отменить.';
            }
        }

        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, div.innerHTML);
        }

        function getPlainText() {
            return div.innerText;
        }

        function textToHtml(text) {
            const temp = document.createElement('div');
            temp.textContent = text;
            let html = temp.innerHTML;
            html = html.replace(/\n/g, '<br>');
            return html;
        }

        function enterEditMode() {
            if (isEditing) return;
            originalContent = div.innerHTML;
            const textarea = document.createElement('textarea');
            textarea.value = getPlainText();
            div.innerHTML = '';
            div.appendChild(textarea);
            textarea.focus();
            isEditing = true;
        }

        function saveAndExit() {
            if (!isEditing) return;
            const textarea = div.querySelector('textarea');
            if (!textarea) {
                isEditing = false;
                return;
            }
            const newHtml = textToHtml(textarea.value);
            div.innerHTML = newHtml;
            saveToStorage();
            isEditing = false;
        }

        function cancelAndExit() {
            if (!isEditing) return;
            div.innerHTML = originalContent;
            isEditing = false;
        }

        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === 'e' || e.key === 'E')) {
                e.preventDefault();
                if (!isEditing) enterEditMode();
            }
            else if (e.ctrlKey && (e.key === 's' || e.key === 'S') && isEditing) {
                e.preventDefault();
                saveAndExit();
            }
            else if (e.key === 'Escape' && isEditing) {
                e.preventDefault();
                cancelAndExit();
            }
        });

        div.addEventListener('click', function() {
            if (!isEditing) div.focus();
        });

        loadFromStorage();
    </script>
</body>
</html>
