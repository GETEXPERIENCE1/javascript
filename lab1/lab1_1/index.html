<!DOCTYPE html>
<html lang="ru">



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>


    <body>
        <div class="calculator-card">
            <div class ='header'>
            <h1>Пенсионный калькулятор</h1>
            </div>
        
            <div class="form-container">
                <form id="pensionForm" novalidate>
                    <div class="input-group">
                    <input type="number" id="ageInput" class="age-input" placeholder="Например: 35" step="1" min="0">
                    </div>
                    
                    <div class="input-group">
                        <label>Укажите Ваш пол</label>
                        
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="gender" value="male" id="genderMale" required>Мужской
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="gender" value="female" id="genderFemale" required>Женский
                            </label>
                        </div>
                    </div>

                    <button type="submit" class = "btn-calc">Рассчитать</button>
                    <div class="result-area">
                        <label>📋 Результат:</label>
                        <textarea id="resultTextarea" rows="3" readonly placeholder="Заполните поля и нажмите «Рассчитать»"></textarea>
                     </div>
                </form>
            </div>
            <footer>Пенсионный помощник расчёт по возрасту и полу</footer>
        </div>
        <script defer src='lab1_1.js'></script>
    </body>
    </html>
