<!DOCTYPE html>
<html lang="ru">



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пенсионный калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>
    <div class="calculator-card">
        <div class ='header'>
        <h1>Пенсионный калькулятор</h1>
        </div>
       
        <div class="form-container">
            <form id="pesionForm">
                <div class="input-group">
                   <input type="number" id="ageInput" class="age-input" placeholder="Например: 35" step="1" min="0">
                </div>
                
                <div class="input-group">
                    <label>Укажите Ваш пол</label>
                    <div class="radio-group">
                        <label class="radio-option">
                            <input type="radio" name="gender" value="male" id="genderMale">Мужской
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="gender" value="female" id="genderFemale">Женский
                        </label>
                    </div>
                </div>

                <button type="submit" class = "btn-calc">Рассчитать</button>

            </form>
        </div>
        <footer>Пенсионный помощник расчёт по возрасту и полу</footer>
    </div>
    <script defer src='lab1_1.js'></script>
</body>
</html>
